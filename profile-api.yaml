openapi: 3.0.0
info:
  title: FinalScout Profile APIs Reference
  description: |
    # Introduction
    Visit this page to get your API key, set whitelist IP: [https://finalscout.com/app/api/settings](https://finalscout.com/app/api/settings).

    FinalScout APIs permission is available to select plans. Please visit this page for latest info: [https://finalscout.com/plans](https://finalscout.com/plans). If you need test credits or increase your rate limits, please contact us via the online chat or email us at [dev@finalscout.com](mailto:dev@finalscout.com).

    ## About this reference
    This API reference covers **LinkedIn profile retrieval** only (person and company profiles via the Profile endpoints below). For **other FinalScout APIs**, see the full documentation: [https://finalscout.com/public/doc/api.html](https://finalscout.com/public/doc/api.html).

    ## API cost
    The standard rate is **0.5 credit** per person profile (`POST /v1/profile/person`) and per company profile (`POST /v1/profile/company`). If your account has a custom rate agreed with FinalScout, that custom rate is applied instead of the standard rate. Successful responses include `credits_consumed` and `credits_available` so you can verify usage.

    The person profile endpoint (`POST /v1/profile/person`) accepts an optional `extended` parameter (default `false`). When `extended` is `false`, a **basic** LinkedIn person profile is returned at a lower credit cost. When `extended` is `true`, the **full** LinkedIn person profile is returned at the standard rate. Contact your account manager for detailed pricing.
    ## Revision History
    Version | Date | Notes
    --- | --- | ---
    1.6.0 | 2026-04-02 | Added `extended` parameter (default `false`) to `POST /v1/profile/person`. When `false`, returns a basic LinkedIn person profile at a lower credit cost; when `true`, returns the full LinkedIn person profile. Contact your account manager for pricing details.
    1.5.0 | 2026-03-15 | Added Profile APIs: `POST /v1/profile/person` to fetch LinkedIn person profile by profile URL (positions, educations, skills, etc.), and `POST /v1/profile/company` to fetch LinkedIn company profile by company URL (industries, specialities, staff count, etc.). Both endpoints consume credits and return `credits_available` and `credits_consumed` in the response.
  version: 1.6.0
  contact:
    email: dev@finalscout.com
    name: FinalScout APIs Support
  x-logo:
    url: https://finalscout.com/public/icons/logo-text.png
    altText: FinalScout logo
servers:
  - url: 'https://api.finalscout.com'
tags:
  - name: Profile
    description: |
      APIs for fetching LinkedIn person and company profile data. Each successful request consumes credits: standard rate is 0.5 credit per person or company profile; accounts with a custom agreed rate use that rate instead. See **API cost** in the document introduction for details.
components:
  securitySchemes:
    api_key_auth:
      type: apiKey
      name: Authorization
      in: header
      description: |
        Submit authentication details by Header method:
          > 1. Get `API Key` from [API Setting](https://finalscout.com/app/api/settings).
          > 2. Set `API Key` to request header `Authorization`.
  schemas:
    CreditsLimitObject:
      type: object
      description: Credits limit response.
      properties:
        credits_required:
          type: number
          description: Credits required for this task (standard Profile API rate is 0.5 credit per request unless your account has a custom rate).
        credits_available:
          type: number
          minimum: -1
          description: Credits remaining in your account.
    PersonProfileEducation:
      type: object
      description: A single education entry.
      properties:
        company_linkedin_id:
          type: integer
          description: LinkedIn organization/school ID for the institution.
        degree:
          type: string
          description: Degree name (e.g. Master of Science - MS).
        ended_on:
          type: string
          description: End date in YYYY-MM format.
        field_of_study:
          type: string
          description: Field of study or major.
        school_name:
          type: string
          description: Name of the school or institution.
        school_linkedin_id:
          type: integer
          description: LinkedIn ID of the school.
        school_logo:
          type: string
          description: School logo image URL.
        school_url:
          type: string
          description: LinkedIn URL for the school.
        started_on:
          type: string
          description: Start date in YYYY-MM format.
    PersonProfilePosition:
      type: object
      description: A single position/employment entry.
      properties:
        company_linkedin_id:
          type: integer
          description: LinkedIn company ID.
        company_linkedin_public_id:
          type: string
          description: Company's public URL slug on LinkedIn (e.g. join-raisin).
        company_name:
          type: string
          description: Company name.
        company_logo:
          type: string
          description: Company logo image URL.
        company_website:
          type: string
          description: Company website URL.
        employment_type:
          type: string
          description: Type of employment (e.g. Full-time, Contract, Internship).
        ended_on:
          type: string
          description: End date in YYYY-MM format; empty string if currently employed.
        location:
          type: string
          description: Job location.
        started_on:
          type: string
          description: Start date in YYYY-MM format.
        title:
          type: string
          description: Job title.
    PersonProfileCertification:
      type: object
      description: A single certification entry.
      properties:
        authority:
          type: string
          description: Issuing authority or organization.
        company_linkedin_id:
          type: integer
          description: LinkedIn ID of the issuing organization.
        company_linkedin_public_id:
          type: string
          description: Public URL slug of the issuing organization on LinkedIn.
        company_logo:
          type: string
          description: Logo URL of the issuing organization.
        company_name:
          type: string
          description: Name of the issuing organization.
        display_source:
          type: string
          description: Display source URL.
        ended_on:
          type: string
          description: Expiration date in YYYY-MM format.
        license_number:
          type: string
          description: License or credential number.
        name:
          type: string
          description: Certification name.
        started_on:
          type: string
          description: Issue date in YYYY-MM format.
        url:
          type: string
          description: Credential URL.
    PersonProfileVolunteerExperience:
      type: object
      description: A single volunteer experience entry.
      properties:
        cause:
          type: string
          description: Cause category (e.g. HUMANITARIAN_RELIEF).
        company_linkedin_id:
          type: integer
          description: LinkedIn ID of the organization.
        company_linkedin_public_id:
          type: string
          description: Public URL slug of the organization on LinkedIn.
        company_logo:
          type: string
          description: Organization logo URL.
        company_name:
          type: string
          description: Organization name.
        ended_on:
          type: string
          description: End date in YYYY-MM format.
        role:
          type: string
          description: Volunteer role or title.
        started_on:
          type: string
          description: Start date in YYYY-MM format.
    PersonProfile:
      type: object
      description: Person profile details.
      properties:
        avatar:
          type: string
          description: Profile picture/avatar image URL.
        awards:
          type: array
          description: List of awards.
          items:
            type: object
        birth_date:
          type: string
          description: Birth date if available.
        certifications:
          type: array
          description: List of certifications.
          items:
            $ref: '#/components/schemas/PersonProfileCertification'
        city:
          type: string
          description: City.
        country:
          type: string
          description: Country.
        courses:
          type: array
          description: List of courses.
          items:
            type: object
        creator:
          type: boolean
          description: Whether the person is a LinkedIn creator.
        educations:
          type: array
          description: List of education entries.
          items:
            $ref: '#/components/schemas/PersonProfileEducation'
        firstname:
          type: string
          description: First name.
        full_name:
          type: string
          description: Full name.
        headline:
          type: string
          description: Profile headline or one-line summary.
        hiring:
          type: boolean
          description: Whether the person is currently hiring.
        industries:
          type: array
          description: List of industries.
          items:
            type: string
        influencer:
          type: boolean
          description: Whether the person is a LinkedIn influencer.
        languages:
          type: array
          description: List of languages spoken.
          items:
            type: string
        last_name:
          type: string
          description: Last name.
        linkedin_entity_urn:
          type: string
          description: LinkedIn entity URN (internal identifier).
        linkedin_object_urn:
          type: integer
          description: LinkedIn object URN numeric part.
        linkedin_public_id:
          type: string
          description: Public URL slug for the profile.
        linkedin_url:
          type: string
          description: Full LinkedIn profile URL.
        location:
          type: string
          description: Full location string (city, state, country, etc.).
        middle_name:
          type: string
          description: Middle name if available.
        open_to_work:
          type: boolean
          description: Whether the person has the "Open to Work" badge.
        positions:
          type: array
          description: List of position/employment entries.
          items:
            $ref: '#/components/schemas/PersonProfilePosition'
        premium:
          type: boolean
          description: Whether the person has a LinkedIn Premium account.
        projects:
          type: array
          description: List of projects.
          items:
            type: object
        publications:
          type: array
          description: List of publications.
          items:
            type: object
        skills:
          type: array
          description: List of skills.
          items:
            type: string
        state:
          type: string
          description: State or region.
        summary:
          type: string
          description: Profile summary or "About" section.
        title:
          type: string
          description: Current job title.
        volunteer_experiences:
          type: array
          description: List of volunteer experiences.
          items:
            $ref: '#/components/schemas/PersonProfileVolunteerExperience'
    ProfilePersonResponse:
      type: object
      description: Response body for the get person profile endpoint.
      properties:
        success:
          type: boolean
          description: Whether the request succeeded.
        credits_available:
          type: number
          description: Remaining credits in your account.
        credits_consumed:
          type: number
          description: Credits consumed for this request (typically 0.5 at standard rate; custom rates apply when agreed).
        profile:
