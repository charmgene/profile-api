    CompanyProfileFundingRound:
      type: object
      description: Details about the last funding round.
      properties:
        funding_type:
          type: string
          description: Type of funding (e.g. SERIES_A, SERIES_UNKNOWN).
        money_raised:
          type: integer
          description: Amount of money raised in the round.
        announced_on:
          type: string
          format: date-time
          description: Announcement date of the funding round.
        lead_investors:
          type: array
          description: List of lead investors.
          items:
            type: object
            properties:
              name:
                type: string
                description: Investor name.
              logo:
                type: string
                description: Investor logo URL.
              investor_url:
                type: string
                description: Crunchbase investor URL.
        num_of_other_investors:
          type: integer
          description: Number of other investors in the round.
        round_url:
          type: string
          description: Crunchbase URL for the funding round.
    CompanyProfileFundingData:
      type: object
      description: Funding information for the company.
      properties:
        num_of_funding_rounds:
          type: integer
          description: Total number of funding rounds.
        last_funding_round:
          $ref: '#/components/schemas/CompanyProfileFundingRound'
        organization_url:
          type: string
          description: Crunchbase organization URL.
        funding_rounds_url:
          type: string
          description: Crunchbase URL listing all funding rounds.
    CompanyProfile:
      type: object
      description: Company profile details.
      properties:
        city:
          type: string
          description: Company city.
        country:
          type: string
          description: Country code (e.g. US).
        description:
          type: string
          description: Company description or summary.
        funding_data:
          $ref: '#/components/schemas/CompanyProfileFundingData'
        headline:
          type: string
          description: Company headline or tagline.
        industries:
          type: array
          description: List of industries.
          items:
            type: string
        linkedin_object_urn:
          type: integer
          description: LinkedIn company object URN numeric part.
        linkedin_public_id:
          type: string
          description: Company's public URL slug on LinkedIn (e.g. microsoft).
        linkedin_url:
          type: string
          description: Full LinkedIn company page URL.
        logo:
          type: string
          description: Company logo image URL.
        name:
          type: string
          description: Company name.
        phone:
          type: string
          description: Company phone number.
        postal_code:
          type: string
          description: Postal or ZIP code.
        raw_address:
          type: string
          description: Raw address string.
        specialities:
          type: array
          description: List of company specialities or focus areas.
          items:
            type: string
        staff_count:
          type: integer
          description: Number of employees.
        state:
          type: string
          description: State or region.
        street_address:
          type: string
          description: Street address.
        tags:
          type: array
          description: List of company-related tags.
          items:
            type: string
        type:
          type: string
          description: Company type (e.g. Public Company, Privately Held).
        website:
          type: string
          description: Company website URL.
        year_founded:
          type: integer
          description: Year the company was founded.
    ProfileCompanyResponse:
      type: object
      description: Response body for the get company profile endpoint.
      properties:
        success:
          type: boolean
          description: Whether the request succeeded.
        credits_available:
          type: number
          description: Remaining credits in your account.
        credits_consumed:
          type: number
          description: Credits consumed for this request (typically 0.5 at standard rate; custom rates apply when agreed).
        profile:
          $ref: '#/components/schemas/CompanyProfile'
paths:
  /v1/profile/person:
    post:
      tags:
        - Profile
      summary: Get LinkedIn person profile
      description: Fetch detailed profile data for a LinkedIn person by their profile URL, including positions, educations, skills, certifications, volunteer experiences, and more. Set `extended` to `true` for the full profile or omit it (defaults to `false`) for a basic profile at a lower credit cost.
      security:
        - api_key_auth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - linkedin_url
              properties:
                linkedin_url:
                  type: string
                  description: Required. LinkedIn person profile URL (e.g. https://www.linkedin.com/in/username).
                extended:
                  type: boolean
                  default: false
                  description: Optional. If `false` (default), returns a basic LinkedIn profile at a lower credit cost. If `true`, returns the full LinkedIn profile at the standard rate. Contact your account manager for pricing details.
              example:
                linkedin_url: "https://www.linkedin.com/in/johndoe"
                extended: false
      responses:
        '200':
          description: Indicates the request is successful.
          content:
            application/json:
